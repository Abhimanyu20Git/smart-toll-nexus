<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartToll Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon" id="roleIcon">U</div>
                <h2 id="roleTitle">User Portal</h2>
                <p id="roleDesc">Sign in to your account</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="your.email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <div id="registerFields">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="your.email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="regPhone">Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="+91 98765 43210" required>
                    </div>
                    <div class="form-group" id="vehicleField">
                        <label for="regVehicle">Vehicle Number</label>
                        <input type="text" id="regVehicle" placeholder="MH-01-AB-1234">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Create password" required>
                    </div>
                    <button type="button" id="sendOtpBtn" class="btn btn-primary btn-full">Send OTP</button>
                </div>
                <div id="otpSection" style="display: none;">
                    <div class="otp-info">
                        <p>OTP has been sent to your email and phone</p>
                    </div>
                    <div class="form-group">
                        <label for="otpInput">Enter OTP</label>
                        <input type="text" id="otpInput" placeholder="123456" maxlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Verify & Register</button>
                    <button type="button" id="changeDetailsBtn" class="btn btn-ghost btn-full">Change Details</button>
                </div>
            </form>

            <div class="auth-footer">
                <a href="index.html">Back to Home</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
