<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - SmartToll Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Dashboard Header -->
    <header class="dash-header">
        <div class="container dash-header-inner">
            <div class="dash-brand">
                <span class="dash-logo">ST</span>
                <div>
                    <h1>SmartToll Connect</h1>
                    <p>User Dashboard</p>
                </div>
            </div>
            <button class="btn btn-ghost dark-toggle" id="darkModeToggle">&#9790;</button><button class="btn btn-ghost" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="dash-main">
        <div class="container">
            <div class="user-top-grid">
                <!-- Wallet Card -->
                <div class="wallet-card">
                    <div class="wallet-label">Wallet Balance</div>
                    <div class="wallet-amount" id="walletAmount">&#8377;250.50</div>
                    <button class="btn btn-accent" id="rechargeBtn">Recharge Wallet</button>
                </div>

                <!-- Vehicle Info -->
                <div class="card vehicle-card">
                    <h3>Vehicle Info</h3>
                    <div class="info-row">
                        <span class="info-label">Vehicle Number</span>
                        <span class="info-value">MH-01-AB-1234</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">RFID Status</span>
                        <span class="info-value status-active">Active</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Toll</span>
                        <span class="info-value">2025-08-07, 14:30</span>
                    </div>
                </div>
            </div>

            <!-- Transaction History -->
            <div class="card">
                <div class="card-header">
                    <h3>Transaction History</h3>
                    <p class="text-muted">View all your toll payments and wallet recharges</p>
                </div>
                <div class="transaction-list" id="transactionList"></div>
            </div>
        </div>
    </main>

    <!-- Recharge Modal -->
    <div class="modal-overlay" id="rechargeModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Recharge Wallet</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <p class="text-muted">Add funds to your SmartToll wallet</p>
            <div class="form-group" style="margin-top: 16px;">
                <label for="rechargeAmount">Amount (&#8377;)</label>
                <input type="number" id="rechargeAmount" placeholder="50.00" min="1" step="0.01">
            </div>
            <div class="preset-amounts">
                <button class="btn btn-outline-dark preset-btn" data-amount="50">&#8377;50</button>
                <button class="btn btn-outline-dark preset-btn" data-amount="100">&#8377;100</button>
                <button class="btn btn-outline-dark preset-btn" data-amount="200">&#8377;200</button>
            </div>
            <button class="btn btn-primary btn-full" id="payNowBtn" style="margin-top: 16px;">Pay Now</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="user-dashboard.js"></script>
</body>
</html>
